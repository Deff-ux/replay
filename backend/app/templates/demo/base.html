<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Neo Demo{% endblock %}</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#f0f2f5; color:#333; }
        .container { max-width:960px; margin:0 auto; padding:20px; }
        .card { background:#fff; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.1); padding:24px; margin:16px 0; }
        h1 { font-size:24px; margin-bottom:16px; color:#1a73e8; }
        .nav { background:#1a73e8; padding:12px 24px; display:flex; gap:20px; align-items:center; }
        .nav a { color:white; text-decoration:none; font-size:14px; padding:6px 12px; border-radius:4px; }
        .nav a:hover { background:rgba(255,255,255,.15); }
        .nav .brand { font-weight:700; font-size:18px; margin-right:auto; }
        .btn { display:inline-block; padding:10px 20px; border:none; border-radius:6px; cursor:pointer; font-size:14px; font-weight:600; text-decoration:none; }
        .btn-primary { background:#1a73e8; color:white; }
        .btn-danger { background:#d93025; color:white; }
        .btn-success { background:#188038; color:white; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-weight:600; margin-bottom:4px; font-size:13px; color:#555; }
        .form-group input, .form-group select { width:100%; padding:10px 12px; border:1px solid #dadce0; border-radius:6px; font-size:14px; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:10px 12px; text-align:left; border-bottom:1px solid #e8eaed; font-size:14px; }
        th { font-weight:600; color:#555; font-size:12px; text-transform:uppercase; }
        .badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:12px; font-weight:600; }
        .badge-success { background:#e6f4ea; color:#188038; }
        .badge-warning { background:#fef7e0; color:#e37400; }
        .alert { padding:12px 16px; border-radius:6px; margin:12px 0; font-size:14px; }
        .alert-error { background:#fce8e6; color:#d93025; }
        .alert-success { background:#e6f4ea; color:#188038; }
    </style>
</head>
<body>
    <nav class="nav">
        <span class="brand">🏢 Neo</span>
        <a href="/demo/dashboard">Dashboard</a>
        <a href="/demo/employees">Employees</a>
        <a href="/demo/search">Search</a>
        <a href="/demo/leave">Leave</a>
        <a href="/demo/reports">Reports</a>
        <a href="/demo/payslip">Payslip</a>
        <a href="/demo/logout" style="color:rgba(255,255,255,.7)">Logout</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
