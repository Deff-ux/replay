{% extends "demo/base.html" %}
{% block title %}Login — Neo Demo{% endblock %}
{% block content %}
<div class="card" style="max-width:400px;margin:60px auto;">
    <h1 style="text-align:center;">Sign In</h1>
    {% if error %}
    <div class="alert alert-error flash" id="error-msg">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success flash">{{ success }}</div>
    {% endif %}
    <form method="POST" action="/demo/login">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" value="admin" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="login-btn">Login</button>
    </form>
    <p class="meta" style="text-align:center;margin-top:16px;">Demo: admin / admin123</p>
</div>
{% endblock %}
