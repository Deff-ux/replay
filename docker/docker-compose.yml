services:
  replay:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: replay:latest
    ports:
      - "8446:8446"
    volumes:
      - replay_data:/data
    environment:
      - REPLAY_SECRET_KEY=${REPLAY_SECRET_KEY:-change-me-in-production}
      - REPLAY_DATABASE_URL=/data/test.db
      - REPLAY_ARTIFACTS_DIR=/data/artifacts
      - REPLAY_SEEDS_DIR=/data/seeds
      - REPLAY_ARTIFACT_RETENTION_DAYS=${ARTIFACT_RETENTION_DAYS:-30}
      - REPLAY_TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - REPLAY_TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - REPLAY_OPENPROJECT_URL=${OPENPROJECT_URL:-}
      - REPLAY_OPENPROJECT_API_KEY=${OPENPROJECT_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8446/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - replay
    restart: unless-stopped

volumes:
  replay_data:
