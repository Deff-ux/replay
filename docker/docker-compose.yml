version: '3.8'
services:
  replay:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports: ["8446:8446"]
    volumes:
      - replay-data:/data
      - ../backend:/app/backend
    environment:
      - REPLAY_SECRET_KEY=dev-secret-key-change-in-prod
      - REPLAY_DEBUG=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8446/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
volumes:
  replay-data:
